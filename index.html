<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlixZone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 70px;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, #0a0a0a 70%, transparent);
    padding: 16px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .logo span { color: #e50914; }

  .hero {
    position: relative;
    height: 280px;
    overflow: hidden;
    margin-bottom: 0;
    cursor: pointer;
    background: #111;
  }
  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10,10,10,0.2) 0%, rgba(10,10,10,0.95) 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 16px;
  }
  .hero-title { font-size: 28px; font-weight: 800; line-height: 1.1; margin-bottom: 6px; }
  .hero-meta { font-size: 13px; color: #aaa; margin-bottom: 14px; }
  .hero-meta span { color: #e50914; font-weight: 600; }
  .hero-btns { display: flex; gap: 10px; }
  .btn-play {
    background: #e50914;
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-play svg { width: 16px; height: 16px; fill: #fff; }

  .tabs {
    display: flex;
    margin: 16px 16px 20px;
    background: #1a1a1a;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    font-size: 14px;
    font-weight: 600;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 6px;
    margin: 3px;
  }
  .tab.active { background: #e50914; color: #fff; }

  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 17px;
    font-weight: 700;
    padding: 0 16px 12px;
    color: #fff;
  }

  /* ===== GRID - FULLY RESPONSIVE ===== */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    padding: 0 16px;
  }

  .movie-card {
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: #1a1a1a;
    transition: transform 0.2s;
  }
  .movie-card:hover { transform: scale(1.04); }
  .movie-card img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
  }
  .movie-card-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 16px 6px 6px;
  }
  .movie-card-title { font-size: 11px; font-weight: 600; line-height: 1.3; color: #fff; }
  .movie-card-category {
    font-size: 9px;
    color: #e50914;
    font-weight: 600;
    text-transform: uppercase;
  }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #111;
    border-top: 1px solid #222;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0 14px;
    z-index: 200;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    color: #666;
    font-size: 10px;
    transition: color 0.2s;
  }
  .nav-item.active { color: #e50914; }
  .nav-item svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }

  /* ===== PLAYER MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    width: 100%;
    max-width: 800px;
    background: #0a0a0a;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #222;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: #111;
  }
  .modal-title { font-size: 16px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
  .modal-close {
    background: #2a2a2a;
    border: none;
    color: #fff;
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
  }
  .modal-close:hover { background: #e50914; }
  .video-wrap {
    position: relative;
    background: #000;
    width: 100%;
    padding-bottom: 56.25%;
    height: 0;
  }
  .video-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }
  .modal-meta {
    padding: 10px 16px;
    color: #aaa;
    font-size: 13px;
    line-height: 1.6;
    background: #0a0a0a;
  }

  .search-bar {
    margin: 0 16px 16px;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 11px 40px 11px 14px;
    color: #fff;
    font-size: 14px;
    outline: none;
  }
  .search-bar input::placeholder { color: #666; }
  .search-bar svg {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    stroke: #666; fill: none; stroke-width: 2;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .movie-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .hero { height: 200px; }
    .hero-title { font-size: 20px; }
  }
  @media (min-width: 601px) and (max-width: 900px) {
    .movie-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 901px) {
    .movie-grid { grid-template-columns: repeat(5, 1fr); }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <div class="logo">Flix<span>Zone</span></div>
  <div class="header-icons">
    <svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </div>
</div>

<!-- ===== HERO BANNER ===== -->
<div class="hero" id="heroBanner" onclick="openPlayer(getHeroMovieId())">
  <img id="heroImg" src="" alt="Hero" onerror="this.style.background='#e50914';this.src=''">
  <div class="hero-overlay">
    <div class="hero-title" id="heroTitle">Loading...</div>
    <div class="hero-meta" id="heroMeta"><span id="heroYear">---</span> &nbsp;·&nbsp; <span id="heroGenre">---</span></div>
    <div class="hero-btns">
      <button class="btn-play" onclick="event.stopPropagation(); openPlayer(getHeroMovieId())">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff;"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Play Now
      </button>
    </div>
  </div>
</div>

<!-- ===== CATEGORY TABS ===== -->
<div class="tabs">
  <div class="tab active" data-category="movies" onclick="switchCategory('movies')">Movies</div>
  <div class="tab" data-category="tvshow" onclick="switchCategory('tvshow')">TV Show</div>
  <div class="tab" data-category="skill" onclick="switchCategory('skill')">Skill</div>
</div>

<!-- ===== SEARCH ===== -->
<div class="search-bar">
  <input type="text" placeholder="Search..." id="searchInput" oninput="filterContent()">
  <svg viewBox="0 0 24 24" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:#666;fill:none;stroke-width:2;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
</div>

<!-- ===== CONTENT GRID ===== -->
<div id="contentSection">
  <div class="section">
    <div class="section-title" id="categoryTitle">🎬 Movies</div>
    <div class="movie-grid" id="movieGrid"></div>
  </div>
</div>

<!-- ===== BOTTOM NAV ===== -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="setNav(this, 'home')">
    <svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </div>
  <div class="nav-item" onclick="setNav(this, 'subscribe')">
    <svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;"><path d="M12 2v20M2 12h20"/></svg>
    Subscribe
  </div>
</div>

<!-- ===== PLAYER MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Movie</div>
      <button class="modal-close" onclick="closePlayer()">✕</button>
    </div>
    <div class="video-wrap">
      <iframe id="ytPlayer" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="modal-meta" id="modalMeta"></div>
  </div>
</div>

<script>
// ============================================================

    yt: 'xjDjITE7pWc',
    desc: 'Wakanda ka raja T\'Challa apni dharti ko bachata hai.'
  },
  {

    yt: 'pVAaFBGlbMU',

  // ===== TV SHOWS (5) =====
  {
    id: 't1',
    title: 'Breaking Bad',
    year: '2008',
    category: 'tvshow',
    img: 'https://upload.wikimedia.org/wikipedia/en/6/61/Breaking_Bad_title_card.png',

  {

  {

  {

    title: 'React Tutorial',

    desc: 'React.js for beginners.'
  }
];

// ============================================================
// ===== CODE - ISME KUCH MAT CHHEDO =====
// ============================================================
let currentCategory = 'movies';

function getHeroMovieId() {
  const items = VIDEOS.filter(v => v.category === 'movies');
  return items.length > 0 ? items[0].id : null;
}

function renderGrid() {
  const grid = document.getElementById('movieGrid');
  const items = VIDEOS.filter(v => v.category === currentCategory);
  if (!items.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#666;padding:20px;">No videos in this category.</div>';
    return;
  }
  grid.innerHTML = items.map(m => `
    <div class="movie-card" onclick="openPlayer('${m.id}')">
      <img src="${m.img}" alt="${m.title}" onerror="this.style.background='#2a2a2a'; this.src=''">
      <div class="movie-card-overlay">
        <div class="movie-card-category">${m.category}</div>
        <div class="movie-card-title">${m.title}</div>
      </div>
    </div>
  `).join('');
}

function renderHero() {
  const items = VIDEOS.filter(v => v.category === 'movies');
  const hero = items.length > 0 ? items[0] : null;
  if (hero) {
    document.getElementById('heroImg').src = hero.img || '';
    document.getElementById('heroTitle').textContent = hero.title || 'No Content';
    document.getElementById('heroYear').textContent = hero.year || '';
    document.getElementById('heroGenre').textContent = hero.category || '';
  }
}

function switchCategory(category) {
  currentCategory = category;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.category === category);
  });
  const titles = { movies: '🎬 Movies', tvshow: '📺 TV Shows', skill: '🎓 Skills' };
  document.getElementById('categoryTitle').textContent = titles[category] || category;
  renderGrid();
}

function filterContent() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const items = VIDEOS.filter(v => v.category === currentCategory);
  const filtered = items.filter(m =>
    m.title.toLowerCase().includes(q) ||
    m.year.includes(q) ||
    m.category.includes(q)
  );
  const grid = document.getElementById('movieGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#666;padding:20px;">No results.</div>';
    return;
  }
  grid.innerHTML = filtered.map(m => `
    <div class="movie-card" onclick="openPlayer('${m.id}')">
      <img src="${m.img}" alt="${m.title}" onerror="this.style.background='#2a2a2a'; this.src=''">
      <div class="movie-card-overlay">
        <div class="movie-card-category">${m.category}</div>
        <div class="movie-card-title">${m.title}</div>
      </div>
    </div>
  `).join('');
}

function openPlayer(id) {
  const m = VIDEOS.find(v => v.id === id);
  if (!m) return;
  document.getElementById('modalTitle').textContent = m.title;
  document.getElementById('modalMeta').innerHTML = `<strong style="color:#fff">${m.year} · ${m.category}</strong><br>${m.desc}`;
  document.getElementById('ytPlayer').src = `https://www.youtube.com/embed/${m.yt}?autoplay=1&rel=0&modestbranding=1&showinfo=0&controls=1&fs=0&iv_load_policy=3`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePlayer() {
  document.getElementById('ytPlayer').src = '';
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function setNav(el, type) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  if (type === 'subscribe') {
    alert('🎉 Subscribe feature coming soon!');
  }
}

// ESC key se close
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePlayer();
});

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
  renderHero();
  renderGrid();
});

// ===== DEVTOOLS DETERRENT =====
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', function(e) {
  const k = e.key.toLowerCase();
  if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['i','j','c','k'].includes(k)) || (e.ctrlKey && ['u','s'].includes(k))) {
    e.preventDefault();
    e.stopPropagation();
    return false;
  }
});
</script>
